<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>兔兔子的记录程序发布页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f4f7fc 0%, #e9eef5 100%);
            color: #0a1c2a;
            min-height: 100vh;
            position: relative;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1f4662, #2c7fb8, #4aa3e2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.25rem;
            color: #2c4e6e;
        }

        .programs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            justify-content: center;
            margin: 3rem 0;
        }

        .program-card {
            background: rgba(255,255,255,0.92);
            border-radius: 2.2rem;
            width: 360px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 25px 40px -14px rgba(0,0,0,0.2);
        }

        .program-card:hover {
            transform: translateY(-12px);
            background: rgba(255,255,255,0.98);
        }

        .card-img-top {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #cfdfed, #b3cee6);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-img-top img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1.8rem;
        }

        .card-content h3 {
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: #1a445b;
        }

        .card-badge {
            background: #e2eff9;
            color: #1e6f9f;
            font-size: 0.8rem;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 0.9rem;
        }

        .enter-btn {
            margin-top: 1.5rem;
            font-weight: 700;
            color: #2c7da0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid transparent;
        }

        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .detail-card {
            max-width: 1300px;
            width: 95%;
            background: white;
            border-radius: 2.5rem;
            overflow: hidden;
        }

        .detail-header {
            background: #fefcf5;
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #e2edf7;
        }

        .detail-header h2 {
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .close-detail {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
        }

        .gallery-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding: 1rem 0;
        }

        .gallery-scroll img {
            width: 150px;
            height: 120px;
            object-fit: cover;
            border-radius: 1rem;
            cursor: pointer;
        }

        .main-preview-img {
            max-width: 100%;
            max-height: 380px;
            object-fit: contain;
            margin-top: 1rem;
        }

        .feature-list, .update-note {
            background: #f2f7fc;
            padding: 1.2rem;
            border-radius: 1.5rem;
            margin: 1rem 0;
        }

        .detail-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 1.2rem 2rem;
            background: #fefcf5;
            border-top: 1px solid #e2edf7;
        }

        .download-link {
            background: #1f5e8e;
            color: white;
            padding: 0.6rem 1.3rem;
            border-radius: 2rem;
            text-decoration: none;
            display: inline-block;
            margin-right: 0.5rem;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #ccc;
            color: #4a627a;
        }
    </style>
</head>
<body>
<div id="app">
    <div v-if="!selectedProgram" class="app-container">
        <div class="hero">
            <h1>🎮 兔兔子的记录程序发布页</h1>
            <p>游戏记录 · 书影记录 · Drama记录</p>
        </div>
        <div class="programs-grid">
            <div class="program-card" v-for="p in programs" @click="selectedProgram=p">
                <div class="card-img-top">
                    <img :src="p.cover" alt="封面">
                </div>
                <div class="card-content">
                    <h3>{{ p.name }}</h3>
                    <div class="card-badge">v{{ p.version }}</div>
                    <div class="enter-btn">查看详情 ➜</div>
                </div>
            </div>
        </div>
        <div class="footer-note">
            📧 rararabbitzs@qq.com &nbsp;|&nbsp;
            🎥 B站：<a href="https://space.bilibili.com/100947686" target="_blank">兔兔子的空间</a>
        </div>
    </div>

    <div v-if="selectedProgram" class="detail-overlay" @click.self="selectedProgram=null">
        <div class="detail-card">
            <div class="detail-header">
                <h2><img :src="selectedProgram.cover" width="48" height="48" style="border-radius:12px;"> {{ selectedProgram.name }}</h2>
                <button class="close-detail" @click="selectedProgram=null">✕</button>
            </div>
            <div style="padding:1.5rem">
                <div class="gallery-scroll">
                    <img v-for="img in selectedProgram.gallery" :src="img" @click="preview=img">
                </div>
                <div class="main-preview-img" v-if="preview">
                    <img :src="preview" style="max-width:100%; border-radius:1rem;">
                </div>
                <div class="feature-list"><strong>⚙️ 核心功能</strong><br><span v-html="selectedProgram.features.replace(/\n/g,'<br>')"></span></div>
                <div class="update-note"><strong>📌 最近更新</strong><br>{{ selectedProgram.updateLog }}</div>
            </div>
            <div class="detail-footer">
                <div>
                    <a v-for="link in selectedProgram.downloads" :href="link.url" class="download-link" target="_blank">{{ link.name }}</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>

                        BASE + 'game_1.png',

                    ],

                    updateLog: 'v2.0 修复个人标签无法使用的问题 v2.1 增加添加攻略功能',
                    downloads: [
                        { name: '蓝奏云（高速直链）', url: 'https://wwazm.lanzouu.com/iwmW93rucp4h' }
                    ]
                },
                {
                    name: '书影记录',
                    version: '2.0',
                    cover: BASE + 'book_cover.png',

                    updateLog: 'v2.0 增加有待看功能版本',
                    downloads: [
                        { name: '无待看', url: 'https://wwazm.lanzouu.com/iR0xf3rpo5za' },
                        { name: '有待看', url: 'https://wwazm.lanzouu.com/iQ63F3rpo5yj' }
                    ]

                {

        }
    });
</script>
</body>
</html>
